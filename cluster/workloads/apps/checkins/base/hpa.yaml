# Checkins 애플리케이션의 기본 HPA 설정.
# worker 2대 고정 환경에서 replica를 2~4 범위로 제한적으로 조정한다.

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: checkins
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: checkins
  minReplicas: 2
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
