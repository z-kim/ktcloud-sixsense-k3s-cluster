# Checkins 애플리케이션 Deployment.
# worker node에만 스케줄되도록 하고 health/readiness endpoint를 사용한다.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkins
spec:
  replicas: 2
  selector:
    matchLabels:
      app: checkins
  template:
    metadata:
      labels:
        app: checkins
    spec:
      nodeSelector:
        node-role.k3s-project.io/worker: "true"
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: checkins
      containers:
        - name: checkins
          # overlay에서 실제 이미지로 덮어쓸 것임.
          image: placeholder.invalid/checkins:dev
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: checkins-config
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: checkins-secret
                  key: database-url
                  optional: true
          # 앱 시작 시간이 길거나, 초기 로딩 중 /health 가 실패할 수 있는 경우
          # startupProbe 를 추가해 livenessProbe 가 너무 빨리 재시작시키지 않도록 할 수 있음.
          # 
          # startupProbe:
          #   httpGet:
          #     path: /health
          #     port: http
          #   periodSeconds: 5
          #   failureThreshold: 12
          readinessProbe:
            httpGet:
              path: /health #### DB 꺼져있는 경우 있어서 임시로 바꿈 /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
