# dev 환경 리소스 요청/제한을 지정한다.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkins
spec:
  template:
    spec:
      containers:
        - name: checkins
          resources:
            requests:
              cpu: 150m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
