apiVersion: apps/v1
kind: Deployment
metadata:
  name: doc-converter
spec:
  template:
    spec:
      containers:
        - name: doc-converter
          env:
            - name: APP_RELEASE
              value: demo-v1
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName