# Doc Converter 애플리케이션 Deployment.
# LibreOffice/ghostscript 기반 변환이 무거워서 checkins 보다 넉넉한 메모리와 startupProbe 를 둔다.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: doc-converter
spec:
  replicas: 2
  selector:
    matchLabels:
      app: doc-converter
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: doc-converter
    spec:
      terminationGracePeriodSeconds: 60
      nodeSelector:
        node-role.k3s-project.io/worker: "true"
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: doc-converter
      volumes:
        - name: temp-storage
          emptyDir: {}
      containers:
        - name: doc-converter
          image: placeholder.invalid/doc-converter:dev
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: doc-converter-config
          volumeMounts:
            - name: temp-storage
              mountPath: /app/temp_storage
          startupProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 18
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
