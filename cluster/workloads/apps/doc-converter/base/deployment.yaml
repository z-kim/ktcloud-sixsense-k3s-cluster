# Doc Converter 애플리케이션 Deployment.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: doc-converter
spec:
  minReadySeconds: 10
  progressDeadlineSeconds: 600
  selector:
    matchLabels:
      app: doc-converter
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: doc-converter
    spec:
      terminationGracePeriodSeconds: 60
      nodeSelector:
        node-role.k3s-project.io/worker: "true"
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app: doc-converter
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: doc-converter
      volumes:
        - name: temp-storage
          emptyDir: {}
      containers:
        - name: doc-converter
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 15"] #기존 연결 마무리 시간 15초
          image: doc-converter-image:dev
          imagePullPolicy: IfNotPresent #같은 태그 있으면 캐시된 image 받음
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: doc-converter-config
          volumeMounts:
            - name: temp-storage
              mountPath: /app/temp_storage
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 18
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
