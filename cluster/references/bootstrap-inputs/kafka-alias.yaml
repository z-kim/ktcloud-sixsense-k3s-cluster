# logging namespace 안에서 외부 Kafka 인스턴스를 kube DNS 이름 `kafka` 로 접근하기 위한 alias다.
# 현재는 Argo CD 가 아니라 external-ref Ansible 또는 운영 스크립트가 직접 적용한다.

apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: logging
spec:
  ports:
    - name: kafka
      port: 9092
      protocol: TCP
      targetPort: 9092
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: kafka
  namespace: logging
  labels:
    kubernetes.io/service-name: kafka
addressType: IPv4
ports:
  - name: kafka
    port: 9092
    protocol: TCP
endpoints:
  - addresses:
      - 192.168.110.40
