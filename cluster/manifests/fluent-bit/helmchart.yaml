# K3s bootstrap 단계에서 Fluent Bit Helm chart를 설치한다.

apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: fluent-bit
  namespace: kube-system
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  repo: https://fluent.github.io/helm-charts
  chart: fluent-bit
  version: 0.54.0
  targetNamespace: logging
