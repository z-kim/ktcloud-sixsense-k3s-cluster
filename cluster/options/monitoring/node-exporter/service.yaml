# 내부 확인용 Service다.
# 외부 monitoring instance가 각 노드 private IP:9100을 직접 scrape한다면 필수는 아니다.

apiVersion: v1
kind: Service
metadata:
  name: node-exporter
  namespace: monitoring
  labels:
    app: node-exporter
spec:
  selector:
    app: node-exporter
  ports:
    - name: metrics
      port: 9100
      targetPort: metrics
