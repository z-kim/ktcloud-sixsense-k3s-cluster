# Wave 3: 공통 인프라와 보안 구성 이후에 doc-converter 앱을 배포한다.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: doc-converter-dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    repoURL: https://github.com/z-kim/ktcloud-sixsense-k3s-cluster.git
    targetRevision: main
    path: cluster/workloads/apps/doc-converter/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: apps
  syncPolicy:
    automated:
      prune: true
      selfHeal: false
