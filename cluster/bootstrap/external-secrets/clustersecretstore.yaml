# ESO가 AWS SSM Parameter Store를 읽는 공용 ClusterSecretStore다.
# 현재는 control-plane EC2 IAM role 권한을 사용하므로 별도 static credential은 두지 않는다.

apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: sixsense-parameter-store
spec:
  provider:
    aws:
      service: ParameterStore
      region: ap-northeast-2
