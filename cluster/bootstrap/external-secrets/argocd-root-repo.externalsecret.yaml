# 현재 root-app과 child application 들이 보는 GitHub repository 자격정보를 만든다.
# repo URL이 바뀌면 아래 url도 함께 수정해야 한다.

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: argocd-root-repo
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: sixsense-parameter-store
  target:
    name: argocd-root-repo
    creationPolicy: Owner
    template:
      type: Opaque
      metadata:
        labels:
          argocd.argoproj.io/secret-type: repository
      data:
        url: https://github.com/z-kim/ktcloud-sixsense-k3s-cluster.git
        type: git
  data:
    - secretKey: githubAppID
      remoteRef:
        key: /sixsense/argocd/github-app/app-id
    - secretKey: githubAppPrivateKey
      remoteRef:
        key: /sixsense/argocd/github-app/private-key
