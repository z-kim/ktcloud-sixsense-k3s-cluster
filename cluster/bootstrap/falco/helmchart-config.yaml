# K3s bootstrap лӢЁкі„м—җм„ң Falco chartм—җ мЈјмһ…н•  HelmChartConfigлӢӨ.

apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: falco
  namespace: kube-system
spec:
  valuesContent: |-
    falco:
      buffered_outputs: false
      config_files: []
      load_plugins: []
      plugins: []

    falcosidekick:
      enabled: true
      replicaCount: 2
      config:
        debug: true
        # Kafka forwarding мҳҲмӢң.
        # мӢӨм ңлЎң мӮ¬мҡ©н•  л•ҢлҠ” м•„лһҳ мЈјм„қмқ„ н•ҙм ңн•ҳкі  broker мЈјмҶҢмҷҖ topicмқ„ л§һм¶ҳлӢӨ.
        # KafkaлҠ” ліҙнҶө 9092 нҸ¬нҠёлҘј л§Һмқҙ м“ҙлӢӨ.
        # мқҙ кІҪмҡ° worker nodeм—җм„ң Kafka broker:9092лЎң лӮҳк°Ҳ мҲҳ мһҲм–ҙм•ј н•ҳкі ,
        # Kafka мӘҪ SGлҠ” worker node SGм—җм„ң мҳӨлҠ” ingressлҘј н—Ҳмҡ©н•ҙм•ј н•ңлӢӨ.
        # kafka:
        #   hostport: "kafka-1:9092,kafka-2:9092,kafka-3:9092"
        #   topic: "falco-events"
        #   clientid: "falcosidekick"
        #   minimumpriority: "warning"

    driver:
      kind: modern_ebpf

    # worker-only м ңм•Ҫ X
    nodeSelector: {}

    tolerations:
      - key: "node-role.kubernetes.io/control-plane"
        operator: "Exists"
        effect: "NoSchedule"
      - key: "node-role.kubernetes.io/master"
        operator: "Exists"
        effect: "NoSchedule"

    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 300m
        memory: 256Mi

    falcoctl:
      artifact:
        install:
          enabled: false
        follow:
          enabled: false

    customRules:
      ingress-nginx-k8s-api-exception.yaml: |-
        - rule: Contact K8S API Server From Container
          desc: Ignore expected Kubernetes API access from ingress-nginx controller
          append: true
          condition: >
            and not (
              k8s.ns.name=ingress-nginx and
              proc.name=nginx-ingress-c
            )
      ingress-nginx-crs-reload-shell-exception.yaml: |-
        - rule: Run shell untrusted
          desc: Ignore expected shell spawned during ingress-nginx reload and CRS file loading
          append: true
          condition: >
            and not (
              k8s.ns.name=ingress-nginx and
              proc.name=sh and
              proc.pname=nginx and
              proc.aname[2]=nginx-ingress-c and
              (
                proc.cmdline contains "/etc/nginx/owasp-modsecurity-crs/" or
                proc.cmdline contains ".data 2>/dev/null" or
                proc.cmdline contains "crs-setup.conf"
              )
            )
