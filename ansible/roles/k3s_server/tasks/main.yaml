---
- name: Validate required Terraform-derived variables
  ansible.builtin.assert:
    that:
      - k3s_token is defined
      - k3s_token | length > 0
    fail_msg: "Set k3s_token in vars/dev-runtime.yaml and pass it with --extra-vars @vars/dev-runtime.yaml."

- name: Validate optional Argo CD private repository variables
  ansible.builtin.assert:
    that:
      - (argocd_repo_url | default('') | length == 0 and argocd_repo_ssh_private_key | default('') | length == 0) or
        (argocd_repo_url | default('') | length > 0 and argocd_repo_ssh_private_key | default('') | length > 0)
    fail_msg: "Set both argocd_repo_url and argocd_repo_ssh_private_key together, or leave both empty."

- name: Update apt cache for k3s server packages
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install k3s server packages
  ansible.builtin.apt:
    name: "{{ k3s_server_packages }}"
    state: present

- name: Create k3s config directory
  ansible.builtin.file:
    path: /etc/rancher/k3s
    state: directory
    mode: "0755"

- name: Create k3s manifests directory
  ansible.builtin.file:
    path: /var/lib/rancher/k3s/server/manifests
    state: directory
    mode: "0755"

- name: Render k3s server config
  ansible.builtin.template:
    src: config.yaml.j2
    dest: /etc/rancher/k3s/config.yaml
    mode: "0644"
  notify: Restart k3s

- name: Download k3s installer
  ansible.builtin.get_url:
    url: https://get.k3s.io
    dest: /usr/local/src/get-k3s.sh
    mode: "0755"

- name: Install k3s server
  ansible.builtin.command: /usr/local/src/get-k3s.sh
  environment:
    INSTALL_K3S_EXEC: server
    K3S_TOKEN: "{{ k3s_token }}"
  args:
    creates: /usr/local/bin/k3s

- name: Ensure k3s service is enabled and started
  ansible.builtin.systemd:
    name: k3s
    enabled: true
    state: started
    daemon_reload: true

- name: Render k3s service environment
  ansible.builtin.template:
    src: k3s.service.env.j2
    dest: /etc/systemd/system/k3s.service.env
    mode: "0600"
  notify: Restart k3s

- name: Copy bootstrap namespaces manifest
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../cluster/bootstrap/00-namespaces.yaml"
    dest: /var/lib/rancher/k3s/server/manifests/00-namespaces.yaml
    mode: "0644"

- name: Remove legacy bootstrap manifests now managed by Argo CD
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /var/lib/rancher/k3s/server/manifests/10-ingress-nginx-values.yaml
    - /var/lib/rancher/k3s/server/manifests/11-ingress-nginx-helmchart.yaml
    - /var/lib/rancher/k3s/server/manifests/20-falco-values.yaml
    - /var/lib/rancher/k3s/server/manifests/21-falco-helmchart.yaml
    - /var/lib/rancher/k3s/server/manifests/22-node-exporter-daemonset.yaml

- name: Copy Argo CD bootstrap manifest
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    mode: "0644"
  loop:
    - src: "{{ playbook_dir }}/../../cluster/bootstrap/argocd/values.yaml"
      dest: /var/lib/rancher/k3s/server/manifests/23-argocd-values.yaml
    - src: "{{ playbook_dir }}/../../cluster/bootstrap/argocd/helmchart.yaml"
      dest: /var/lib/rancher/k3s/server/manifests/24-argocd-helmchart.yaml

- name: Copy Argo CD root application manifest
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../cluster/argocd/applications/root.yaml"
    dest: /var/lib/rancher/k3s/server/manifests/26-argocd-root-application.yaml
    mode: "0644"

- name: Render Argo CD private repository secret when SSH key is provided
  ansible.builtin.template:
    src: argocd-repo-secret.yaml.j2
    dest: /var/lib/rancher/k3s/server/manifests/25-argocd-repo-secret.yaml
    mode: "0600"
  when:
    - argocd_repo_url | default('') | length > 0
    - argocd_repo_ssh_private_key | default('') | length > 0
  no_log: true

- name: Remove Argo CD private repository secret when SSH key is not provided
  ansible.builtin.file:
    path: /var/lib/rancher/k3s/server/manifests/25-argocd-repo-secret.yaml
    state: absent
  when:
    - argocd_repo_url | default('') | length == 0
    - argocd_repo_ssh_private_key | default('') | length == 0

- name: Render app database secret manifest when RDS is enabled
  ansible.builtin.template:
    src: checkins-db-secret.yaml.j2
    dest: /var/lib/rancher/k3s/server/manifests/30-checkins-db-secret.yaml
    mode: "0644"
  when: mysql_rds_database_url | default('') | length > 0

- name: Remove app database secret manifest when RDS is disabled
  ansible.builtin.file:
    path: /var/lib/rancher/k3s/server/manifests/30-checkins-db-secret.yaml
    state: absent
  when: mysql_rds_database_url | default('') | length == 0

- name: Create kubeconfig directory for the default SSH user
  ansible.builtin.file:
    path: "/home/{{ ansible_user }}/.kube"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"

- name: Copy kubeconfig for the default SSH user
  ansible.builtin.copy:
    src: /etc/rancher/k3s/k3s.yaml
    dest: "/home/{{ ansible_user }}/.kube/config"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0600"
    remote_src: true
